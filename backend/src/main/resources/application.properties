# ===============================
# = DataSource Config (MySQL)
# ===============================
# Local: defaults below. Railway: set SPRING_DATASOURCE_* or MYSQL* from the MySQL plugin.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:mentorlink_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
app.jwt.expiration-ms=3600000
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# = Flyway (DB Migrations) - disabled when using ddl-auto=update
# ===============================
spring.flyway.enabled=false

# ===============================
# = Server
# ===============================
server.port=${PORT:8080}

# Frontend URL for password reset links (no trailing slash required)
app.frontend.base-url=${APP_FRONTEND_URL:http://localhost:3000}

# Comma-separated origins for CORS (include production frontend URL)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# ===============================
# = JWT
# ===============================
app.jwt.secret=${JWT_SECRET:change-this-to-a-very-long-secret-at-least-32-chars}

# ===============================
# = Email (HTML via Thymeleaf + async JavaMailSender)
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Thymeleaf (email templates under classpath:/templates/email/)
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.cache=true

# File upload (reports can be 10-30 page PDFs)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
app.upload.dir=${UPLOAD_DIR:../uploads}

# NLP Summarization Service (Python Flask + LongT5)
app.nlp.summarization.url=${NLP_SUMMARIZATION_URL:http://localhost:5001}

# Matrix Factorization recommender (repo-local Python pipeline)
app.recommender.python=${RECOMMENDER_PYTHON:python}
app.recommender.matrix-script=${MATRIX_SCRIPT_PATH:python-recommender/analysis/matrix_factorization_recommender.py}
app.recommender.output=${MATRIX_OUTPUT_PATH:python-recommender/outputs/output_matrix_factorization.xlsx}
app.recommender.timeout-seconds=${MATRIX_TIMEOUT_SECONDS:300}
app.recommender.work-dir=${RECOMMENDER_WORK_DIR:uploads/recommender}
