# MentorLink API — Railway service config
# Dashboard: Root Directory = backend, Config file = /backend/railway.toml
# Railpack: also reads backend/railpack.json (JDK 17: set RAILPACK_JDK_VERSION=17)
# Attach MySQL plugin and set env vars (see railway.env.example).

[build]
builder = "NIXPACKS"
buildCommand = "chmod +x mvnw && ./mvnw -DskipTests package"
watchPatterns = ["backend/**"]

[deploy]
startCommand = "java -jar target/mentorlink-backend-0.0.1-SNAPSHOT.jar"
healthcheckPath = "/actuator/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
