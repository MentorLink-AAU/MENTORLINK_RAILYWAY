# Backend API — use when Railway Root Directory is empty (repo root).
# Frontend/NLP need their own services: /frontend/railway.toml, /backend/nlp-summarization/railway.toml
# Alternative: Root Directory = backend, Config file = /backend/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["backend/**"]

[deploy]
healthcheckPath = "/actuator/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
