# Do NOT deploy the repository root as one service.
# Railway detected Node here and ran `npm start` (local dev only).
#
# Create three separate services instead:
#   backend/                  → Config: /backend/railway.toml
#   frontend/                 → Config: /frontend/railway.toml
#   backend/nlp-summarization/ → Config: /backend/nlp-summarization/railway.toml
#
# Plus a MySQL plugin linked to the backend service.

[build]
builder = "NIXPACKS"
buildCommand = "echo 'ERROR: Set Railway Root Directory to backend, frontend, or backend/nlp-summarization — not the repo root.' && exit 1"

[deploy]
startCommand = "echo 'ERROR: Deploy backend, frontend, or NLP as separate Railway services.' && exit 1"
